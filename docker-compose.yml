# Docker Compose for ragcodepilot
# Starts the infrastructure services needed by the CLI tool.
# The Go CLI itself runs on the host machine, not in a container.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ragcodepilot-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local
