# ragcodepilot configuration

# Language definitions: maps file extensions to language names.
# Add new languages or extensions here without changing Go code.
languages:
  go: [".go"]
  rust: [".rs"]
  python: [".py"]
  javascript: [".js"]
  typescript: [".ts"]
  java: [".java"]
  c: [".c", ".h"]
  cpp: [".cpp", ".cc", ".cxx", ".hpp"]
  ruby: [".rb"]
  php: [".php"]
  swift: [".swift"]
  kotlin: [".kt"]
  scala: [".scala"]
  shell: [".sh", ".bash"]
  sql: [".sql"]
  markdown: [".md"]
  yaml: [".yaml", ".yml"]
  toml: [".toml"]
  json: [".json"]

# Directories to skip during file walking.
skip_dirs:
  - .git
  - vendor
  - node_modules
  - .venv
  - __pycache__
  - target
  - bin
  - build

# Glob patterns (matched against each file's base name) to exclude from
# indexing. Defaults to excluding Go test files when this key is omitted.
# Set to an empty list ([]) to index everything, including test files.
# Add language-specific patterns as needed, e.g. "*.test.ts", "*_test.py".
skip_file_patterns:
  - "*_test.go"
